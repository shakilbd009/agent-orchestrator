openapi: 3.1.0
info:
  title: Agent Orchestrator Platform — API Contract
  description: |
    Phase 0 placeholder contract.
    All product endpoints are reserved until their respective BRDs are authored.
    This document defines the API metadata structure, common schema placeholders,
    and the Layer A / Layer B separation contract.
  version: 0.1.0-placeholder

servers:
  - url: https://api.agentorchestrator.example.com/v1
    description: Placeholder server — BRD-01 defines actual deployment target

security:
  - BearerAuth: []

tags:
  - name: Layer A — Orchestrator
    description: |
      Layer A agents (architect, pm) own decomposition, routing, pipeline gates,
      and task handoff contracts. Layer A endpoints govern process, not business logic.
  - name: Layer B — Specialist
    description: |
      Layer B agents (developer, reviewer, qa, devops) own implementation,
      validation, and quality gate delivery. Layer B endpoints are scoped to
      assigned task execution.
  - name: Platform — Metadata
    description: |
      Platform-level metadata endpoints: health, status, agent registry,
      and feature flags. These do not contain product business logic.

paths:
  /health:
    get:
      operationId: getHealth
      summary: Platform health check
      description: Returns platform operational status. No auth required.
      tags: [Platform — Metadata]
      security: []
      responses:
        '200':
          description: Platform is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /status:
    get:
      operationId: getStatus
      summary: Platform status with active phase and gate state
      description: |
        Returns current platform phase, active gates, and governance state.
        Used by dashboards and human approval UIs.
      tags: [Platform — Metadata]
      responses:
        '200':
          description: Status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformStatus'

  /tasks:
    post:
      operationId: createTask
      summary: Layer A — Create and decompose a task
      description: |
        Layer A agents (architect, pm) create tasks and attach child-task
        dependency graphs. This is the entry point for all work decomposition.
        Layer B agents must NOT call this endpoint directly.
      tags: [Layer A — Orchestrator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '403':
          description: Caller is not a Layer A agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{taskId}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      operationId: getTask
      summary: Retrieve task details and current state
      tags: [Layer A — Orchestrator, Layer B — Specialist]
      responses:
        '200':
          description: Task retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{taskId}/promote:
    post:
      operationId: promoteTask
      summary: Layer A — Promote task to next pipeline gate
      description: |
        Advances a task to its next defined gate. Layer B agents may not
        promote tasks past their quality gate. Human approval is required
        at configured gate boundaries.
      tags: [Layer A — Orchestrator]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task promoted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '403':
          description: Promotion not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{taskId}/complete:
    post:
      operationId: completeTask
      summary: Layer B — Mark task as done and signal gate handoff
      description: |
        Layer B agents mark their task as done. This does NOT automatically
        close the quality gate — the gate remains open until Layer A or a
        human approves the handoff.
      tags: [Layer B — Specialist]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCompleteRequest'
      responses:
        '200':
          description: Task marked complete; gate handoff initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '403':
          description: Caller is not the assigned Layer B agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{taskId}/block:
    post:
      operationId: blockTask
      summary: Request human input to proceed
      description: |
        Transitions task to blocked state. A blocked task halts pipeline
        advancement until the blocker is resolved by a human.
      tags: [Layer A — Orchestrator, Layer B — Specialist]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockRequest'
      responses:
        '200':
          description: Task blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /agents:
    get:
      operationId: listAgents
      summary: Platform agent registry
      description: |
        Returns all registered agent profiles and their current operational status.
        Layer A agents are always listed; Layer B agents are included when active.
      tags: [Platform — Metadata]
      responses:
        '200':
          description: Agent registry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRegistry'

components:
  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      description: Kanban task identifier
      schema:
        type: string
        example: t_07d63a0f

  schemas:
    # --- Metadata / Platform Schemas ---

    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [healthy, degraded, maintenance]
        timestamp:
          type: string
          format: date-time

    PlatformStatus:
      type: object
      required: [phase, gates, timestamp]
      properties:
        phase:
          type: string
          enum: [phase-0, phase-1, phase-2]
          description: Current governance phase
        gates:
          type: array
          items:
            $ref: '#/components/schemas/GateStatus'
        featureFlags:
          type: object
          additionalProperties:
            type: boolean
          description: Feature flag states from feature-flags.md
        timestamp:
          type: string
          format: date-time

    GateStatus:
      type: object
      required: [gateId, name, state]
      properties:
        gateId:
          type: string
          example: G0
        name:
          type: string
          example: Foundation & Governance
        state:
          type: string
          enum: [open, passed, blocked]

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: FORBIDDEN
        message:
          type: string
          example: Caller is not authorized to perform this operation

    # --- Task Schemas (placeholder — full shape defined in BRD-02) ---

    TaskCreateRequest:
      type: object
      required: [title, assignee, layer]
      properties:
        title:
          type: string
          description: Short task title
          example: Implement rate limiter
        body:
          type: string
          description: Full task specification
        assignee:
          type: string
          description: Agent profile name
          example: developer
        layer:
          type: string
          enum: [A, B]
          description: Layer A (orchestrator) or Layer B (specialist)
        parents:
          type: array
          items:
            type: string
          description: Parent task IDs for dependency edges
        priority:
          type: integer
          description: Higher = picked sooner
        workspaceKind:
          type: string
          enum: [scratch, dir, worktree]
        tags:
          type: array
          items:
            type: string

    TaskCompleteRequest:
      type: object
      required: [taskId]
      properties:
        taskId:
          type: string
        summary:
          type: string
          description: Human-readable handoff summary
        metadata:
          type: object
          additionalProperties: true
          description: Structured facts about this execution

    BlockRequest:
      type: object
      required: [taskId, reason]
      properties:
        taskId:
          type: string
        reason:
          type: string
          description: One-sentence summary of what is needed

    Task:
      type: object
      required: [id, title, status, layer, createdAt]
      properties:
        id:
          type: string
          example: t_07d63a0f
        title:
          type: string
        body:
          type: string
        status:
          type: string
          enum: [todo, in_progress, done, blocked, cancelled]
        layer:
          type: string
          enum: [A, B]
        assignee:
          type: string
        parents:
          type: array
          items:
            type: string
        children:
          type: array
          items:
            type: string
        priority:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        blockedReason:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    AgentRegistry:
      type: object
      required: [agents]
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentProfile'
        timestamp:
          type: string
          format: date-time

    AgentProfile:
      type: object
      required: [name, layer, status]
      properties:
        name:
          type: string
          example: architect
        layer:
          type: string
          enum: [A, B]
        status:
          type: string
          enum: [active, idle, blocked]
        currentTaskId:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued by the platform auth layer.
        Layer A agents receive tokens with A-tier claims.
        Layer B agents receive tokens scoped to their assigned task.

# ----------------------------------------------------------------------
# BRD-03 — Client Portal BFF Endpoints
# ----------------------------------------------------------------------
# BRD-03 is primarily a BFF frontend. The backend already owns the task,
# project, approval, risk, and milestone data models (BRD-02).
# The BFF layer wraps BRD-02 read APIs, enforces cross-project access filtering,
# strips SSE envelope metadata fields (actorId, actorRole, eventId, schemaVersion,
# parentTaskId, gateId, layer), and applies publication validation before client
# visibility. No new backend data models are introduced by BRD-03.
#
# NOTE: The following endpoints are stubs. Full schemas are defined in BRD-03.
# All paths below MUST be gated on `client-portal` feature flag.
#
# Implemented by BFF (wrapping BRD-02 backends):
#   GET  /client-portal/portfolio        — portfolio landing (health summary, project list)
#   GET  /client-portal/projects/{id}   — project detail (board, risks, milestones, approvals)
#   GET  /client-portal/approvals        — global approval inbox
#   GET  /client-portal/search          — client-safe search across visible projects
#
# SSE stream (managed by BRD-02 backend):
#   GET  /projects/{id}/events          — SSE fanout; BFF strips envelope metadata before client delivery
#
# Wrapped BRD-02 endpoints (not re-declared here):
#   All task, project, approval, risk, milestone read endpoints remain under BRD-02 paths.
#   The BFF does not re-implement backend logic — it filters and transforms BRD-02 responses.

paths:
  /client-portal/portfolio:
    get:
      operationId: getClientPortfolio
      summary: Client Portal — Portfolio summary for a client principal
      description: |
        Returns health summary, project list, and decision counts for all projects
        the authenticated client principal may access. Enforces cross-project
        access filtering. Requires client-portal feature flag.
      tags: [Client Portal — Read]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Portfolio summary retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientPortfolio'
        '403':
          description: Client principal access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /client-portal/projects/{projectId}:
    get:
      operationId: getClientProjectDetail
      summary: Client Portal — Project detail view
      description: |
        Returns project board, health summary, risks, milestones, approvals,
        and comments for the specified project. Requires client-portal flag
        and client principal access to the project.
      tags: [Client Portal — Read]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientProjectDetail'
        '403':
          description: Access denied to this project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  /client-portal/approvals:
    get:
      operationId: getClientApprovalInbox
      summary: Client Portal — Global approval inbox across accessible projects
      description: |
        Returns pending approval items across all accessible projects for the
        client principal. Enforces cross-project access filtering.
      tags: [Client Portal — Read]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Approval inbox retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientApprovalInbox'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /client-portal/search:
    get:
      operationId: clientPortalSearch
      summary: Client Portal — Search across accessible projects
      description: |
        Full-text search across client-visible project, task, risk, milestone,
        approval, and blocker content. Results are filtered to the client
        principal's accessible project set. Forbidden technical fields are
        stripped from search results before return.
      tags: [Client Portal — Read]
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query string
        - name: health
          in: query
          schema:
            type: string
            enum: [on_track, at_risk, blocked]
          description: Filter by delivery health
        - name: status
          in: query
          schema:
            type: string
            enum: [todo, in_progress, blocked, done]
          description: Filter by task status
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientSearchResults'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      description: Project identifier
      schema:
        type: string
        example: proj_9t8k2m

  schemas:
    # --- BRD-03 Client Portal Schemas ---

    ClientPortfolio:
      type: object
      required: [projectsSummary, projectList, decisionSummary, timestamp]
      properties:
        projectsSummary:
          $ref: '#/components/schemas/ProjectsHealthSummary'
        projectList:
          type: array
          items:
            $ref: '#/components/schemas/ClientProjectSummary'
        decisionSummary:
          $ref: '#/components/schemas/ClientDecisionSummary'
        timestamp:
          type: string
          format: date-time

    ProjectsHealthSummary:
      type: object
      properties:
        onTrack:
          type: integer
        atRisk:
          type: integer
        blocked:
          type: integer

    ClientProjectSummary:
      type: object
      required: [id, name, health, confidence, completionPercent, nextMilestone, pendingDecisions, overdueDecisions, latestUpdate]
      properties:
        id:
          type: string
        name:
          type: string
        health:
          type: string
          enum: [on_track, at_risk, blocked]
        confidence:
          type: string
          enum: [high, medium, low]
        completionPercent:
          type: number
          format: float
          description: Calculated as done/(todo+in_progress+blocked+done); null if no active tasks
        nextMilestone:
          type: string
          nullable: true
        pendingDecisions:
          type: integer
        overdueDecisions:
          type: integer
        latestUpdate:
          type: string
          format: date-time

    ClientDecisionSummary:
      type: object
      properties:
        totalPending:
          type: integer
        overdue:
          type: integer
        waitingOnClient:
          type: integer
        atRiskCount:
          type: integer
        blockedCount:
          type: integer

    ClientProjectDetail:
      type: object
      required: [id, health, confidence, completionPercent, board, approvals, risks, milestones, comments, nextAction, timestamp]
      properties:
        id:
          type: string
        health:
          type: string
          enum: [on_track, at_risk, blocked]
        confidence:
          type: string
          enum: [high, medium, low]
        healthReason:
          type: string
        completionPercent:
          type: number
          format: float
          nullable: true
        board:
          type: array
          items:
            $ref: '#/components/schemas/ClientTaskColumn'
        approvals:
          type: array
          items:
            $ref: '#/components/schemas/ClientApprovalItem'
        risks:
          type: array
          items:
            $ref: '#/components/schemas/ClientRiskItem'
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/ClientMilestoneItem'
        comments:
          type: array
          items:
            $ref: '#/components/schemas/ClientComment'
        nextAction:
          type: string
        timestamp:
          type: string
          format: date-time

    ClientTaskColumn:
      type: object
      required: [status, tasks]
      properties:
        status:
          type: string
          enum: [todo, in_progress, blocked, done]
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/ClientTaskCard'

    ClientTaskCard:
      type: object
      required: [id, title, status, ownerLabel, summary, nextAction, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [todo, in_progress, blocked, done]
        ownerLabel:
          type: string
          description: Client-facing owner label (Product, Engineering, Review, Quality, Client)
        summary:
          type: string
        blockerReason:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
        nextAction:
          type: string

    ClientApprovalItem:
      type: object
      required: [id, title, ownerLabel, outcome, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        ownerLabel:
          type: string
        outcome:
          type: string
          enum: [pending, approved, rejected, request_changes, need_more_information]
        createdAt:
          type: string
          format: date-time
        overdue:
          type: boolean

    ClientRiskItem:
      type: object
      required: [id, severity, impact, ownerLabel, mitigationSummary, status, nextAction]
      properties:
        id:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        impact:
          type: string
        ownerLabel:
          type: string
        mitigationSummary:
          type: string
        status:
          type: string
          enum: [open, mitigated, closed]
        nextAction:
          type: string

    ClientMilestoneItem:
      type: object
      required: [id, name, status, targetDate, progress, health, summary, nextAction]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, overdue]
        targetDate:
          type: string
          format: date-time
          nullable: true
        progress:
          type: number
          format: float
        health:
          type: string
          enum: [on_track, at_risk, blocked]
        summary:
          type: string
        nextAction:
          type: string

    ClientComment:
      type: object
      required: [id, authorName, body, createdAt]
      properties:
        id:
          type: string
        authorName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        edited:
          type: boolean
        projectId:
          type: string
        relatedItemId:
          type: string
        body:
          type: string

    ClientApprovalInbox:
      type: object
      required: [items, totalCount, timestamp]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClientApprovalItem'
        totalCount:
          type: integer
        timestamp:
          type: string
          format: date-time

    ClientSearchResults:
      type: object
      required: [items, totalCount, timestamp]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClientSearchResultItem'
        totalCount:
          type: integer
        timestamp:
          type: string
          format: date-time

    ClientSearchResultItem:
      type: object
      required: [id, type, title, projectId, projectName, highlightedContent]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [project, task, risk, milestone, approval, blocker]
        title:
          type: string
        projectId:
          type: string
        projectName:
          type: string
        highlightedContent:
          type: string
          description: Search match snippet with forbidden technical fields already stripped

# ----------------------------------------------------------------------
# PHASE 0 CONTRACT NOTES
# ----------------------------------------------------------------------
#
# This OpenAPI contract is a PLACEHOLDER.  The following are NOT defined
# and are BLOCKED on their respective BRDs:
#
#   BRD-01 (App Shell)         → actual server URL, auth integration, CORS
#   BRD-02 (Orchestration)     → /tasks dependency graph, gate promotion rules
#   BRD-02 (Orchestration)     → /tasks dependency graph, gate promotion rules
#   BRD-03 (Client Portal)     → BFF read endpoints defined below
#   BRD-04 (Agent Dashboard)   → agent-facing task APIs
#   BRD-05 (LLM Provider)     → LLM inference endpoints
#   BRD-06 (Agent Memory)      → memory store read/write endpoints
#   BRD-07 (BRD Authoring)     → BRD create/update API
#   BRD-08 to BRD-21          → domain-specific endpoints
#
# Do NOT add path items for any of the above without their BRD first.
#
# Layer A vs Layer B enforcement:
#   - Layer A endpoints (decompose, promote, gate-approve) reject Layer B tokens
#   - Layer B endpoints (complete, deliver) are scoped to the caller's task
#   - This separation is contractual, enforced by the auth layer
#
# Feature flag key reference (from specs/feature-flags.md):
#   kanban-orchestrator   → enables /tasks endpoints
#   layer-a-agents        → enables Layer A agent operations
#   layer-b-agents        → enables Layer B agent operations
#   human-gates           → enables gate checkpoint enforcement
#   client-portal         → enables /client-portal/* endpoints (BRD-03)

# ADR-03-003 / OQ-03-002 contract parity notes:
#   Task.layer (enum A|B) — internal-only field; BFF must strip from client-visible responses
#   Task.metadata (additionalProperties: true) — client-visible publication requires metadata
#     field name and value scanning per ADR-03-003 forbidden fields list
#   SSE envelope fields (actorId, actorRole, eventId, schemaVersion, parentTaskId, gateId) —
#     stripped by BFF before client SSE delivery per ADR-03-003
#
